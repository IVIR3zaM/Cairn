name: Release

# Cut a release by pushing a semver tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
# GoReleaser builds the cross-platform binaries and publishes the GitHub Release, stamping
# the tag into `cairn --version`. See docs/RELEASING.md.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to IVIR3zaM/homebrew-tap, so GoReleaser can push the
          # Homebrew formula there (the default GITHUB_TOKEN only reaches this repo).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
