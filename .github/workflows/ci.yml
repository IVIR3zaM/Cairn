name: CI

# Cairn dogfoods itself: CI runs the very same `cairn verify` the pre-commit hook runs,
# so local and CI never drift. Because this repo *is* Cairn (not yet a published module),
# we build the binary from source instead of `go install …@latest`, and install the Go
# quality tools `cairn verify` shells out to (gofumpt, golangci-lint).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - name: Install quality tools
        run: |
          go install mvdan.cc/gofumpt@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Build cairn
        run: go build -o cairn ./cmd/cairn
      - name: Verify (cairn verify)
        run: ./cairn verify
